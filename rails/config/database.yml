default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("PGHOST", "127.0.0.1") %>
  port: <%= ENV.fetch("PGPORT", 5432) %>
  username: <%= ENV.fetch("PGUSER", "postgres") %>

# Development: DATABASE_URL takes precedence when set; otherwise falls back to
# individual PG* vars with cryptdash_development as the default database.
# PGPASSWORD is read only when explicitly provided; no password literal is
# embedded in source control.
development:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  password: <%= ENV["PGPASSWORD"] %>
  database: <%= ENV.fetch("PGDATABASE", "cryptdash_development") %>

# Test: when DATABASE_URL is set, derives a cryptdash_test database name so that
# the test suite never silently shares the development database. Falls back to
# individual PG* vars with cryptdash_test as the default database.
# PGPASSWORD is read only when explicitly provided; no password literal is
# embedded in source control.
test:
  <<: *default
  url: <%= ENV["DATABASE_URL"]&.sub(%r{/[^/]*\z}, "/cryptdash_test") %>
  password: <%= ENV["PGPASSWORD"] %>
  database: <%= ENV.fetch("PGDATABASE", "cryptdash_test") %>

# Production requires DATABASE_URL — no local fallback.
production:
  url: <%= ENV["DATABASE_URL"] %>
